name: Linux Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx electron-builder --linux AppImage dir --publish never

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: marky-appimage
          path: dist/*.AppImage
          if-no-files-found: error

      - name: Tar unpacked build for Flatpak
        run: tar -czf dist/marky-linux-x64.tar.gz -C dist/linux-unpacked .

      - name: Upload unpacked build
        uses: actions/upload-artifact@v4
        with:
          name: marky-linux-unpacked
          path: dist/marky-linux-x64.tar.gz
          if-no-files-found: error

      - name: Create release and upload assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/marky-linux-x64.tar.gz
